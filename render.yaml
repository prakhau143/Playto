services:
  - type: web
    name: playto-kyc-backend
    env: python
    rootDir: backend/backend
    buildCommand: pip install -r ../requirements.txt && python manage.py migrate && python manage.py shell < seed.py
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "0"
      # Set these two after Netlify domain is known:
      - key: CORS_ALLOWED_ORIGINS
        value: "https://YOUR-NETLIFY-SITE.netlify.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://YOUR-NETLIFY-SITE.netlify.app"

